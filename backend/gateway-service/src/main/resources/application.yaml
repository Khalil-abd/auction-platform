server:
  port: 8080

spring:
  application:
    name: gateway-service
  
  cloud:
    gateway:
      # Global CORS configuration for our Angular application
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      # Route mappings to forward incoming traffic down to specific microservices
      routes:
        - id: catalog-service-route
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auctions/**

        - id: bidding-service-route
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/bids/**

        - id: notification-service-websocket-route
          uri: ws://localhost:8083
          predicates:
            - Path=/ws-provider/**

management:
  endpoints:
    web:
      exposure:
        include: health