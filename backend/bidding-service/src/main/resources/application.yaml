server:
  port: 8082

spring:
  application:
    name: bidding-service

  # Relational Configuration (PostgreSQL)
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:auction_bidding}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect

  # Cache Configuration (Redis)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Require all brokers to acknowledge the write to guarantee zero data loss
        acks: all

app:
  kafka:
    bids-topic: ${KAFKA_TOPIC_BIDS:auction-bids}
  redis:
    bids-prefix: ${REDIS_PREFIX_BIDS:auction:highest_bid:}