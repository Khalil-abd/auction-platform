version: '3.8'

services:
  # 1. Relational Database: PostgreSQL (For High-Consistency Bidding Engine)
  postgres:
    image: postgres:16-alpine
    container_name: auction-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auction_bidding
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - auction-network

  # 2. Document Database: MongoDB (For Dynamic Product Catalog)
  mongodb:
    image: mongo:7.0
    container_name: auction-mongodb
    ports:
      - "27017:27017"
    environment:
      # Defining the core ground-truth credentials for the database container
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
    volumes:
      - mongo_data:/data/db
    networks:
      - auction-network

  # 3. In-Memory Cache: Redis (For Low-Latency Validations & Rate Limiting)
  redis:
    image: redis:7.2-alpine
    container_name: auction-redis
    ports:
      - "6379:6379"
    command: "redis-server --requirepass ${REDIS_PASSWORD}"
    networks:
      - auction-network

  # 4. Message Broker: Apache Kafka (KRaft Mode - No Zookeeper Required)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: auction-kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk' # Explicitly required by Confluent's startup scripts
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - auction-network

  # 5. API Gateway Edge Router
  gateway-service:
    build:
      context: .
      dockerfile: ./backend/gateway-service/Dockerfile
    container_name: auction-gateway
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - mongodb
    networks:
      - auction-network

  # 6. Catalog Management Service
  catalog-service:
    build:
      context: .
      dockerfile: ./backend/catalog-service/Dockerfile
    container_name: auction-catalog
    ports:
      - "8081:8081"
    environment:
      - MONGODB_HOST=${MONGODB_HOST}
      - MONGODB_PORT=${MONGODB_PORT}
      - MONGODB_USER=${MONGO_ROOT_USER}
      - MONGODB_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
    depends_on:
      - mongodb
    networks:
      - auction-network

  # 7. Relational Transaction Bidding Service
  bidding-service:
    build:
      context: .
      dockerfile: ./backend/bidding-service/Dockerfile
    container_name: auction-bidding
    ports:
      - "8082:8082"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_BIDS=${KAFKA_TOPIC_BIDS}
      - REDIS_PREFIX_BIDS=${REDIS_PREFIX_BIDS}
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - auction-network

  # 8. Real-Time Notification & WebSocket Broker Service
  notification-service:
    build:
      context: .
      dockerfile: ./backend/notification-service/Dockerfile
    container_name: auction-notifications
    ports:
      - "8083:8083"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC_BIDS=${KAFKA_TOPIC_BIDS}
    depends_on:
      - kafka
    networks:
      - auction-network

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local

networks:
  auction-network:
    driver: bridge