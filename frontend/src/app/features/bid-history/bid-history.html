<div class="history-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <mat-icon>history</mat-icon> Bid History
      </mat-card-title>
      <mat-card-subtitle>Auction {{ auctionId }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <a mat-button [routerLink]="['/auctions', auctionId]">
        <mat-icon>arrow_back</mat-icon> Back to Auction
      </a>

      @if (loading) {
        <div class="spinner-wrapper">
          <mat-spinner></mat-spinner>
        </div>
      } @else if (bids.length === 0) {
        <p class="no-bids">No bids have been placed yet.</p>
      } @else {
        <table mat-table [dataSource]="bids" class="full-width">
          <ng-container matColumnDef="amount">
            <th mat-header-cell *matHeaderCellDef>Amount</th>
            <td mat-cell *matCellDef="let bid">{{ bid.amount | currency }}</td>
          </ng-container>

          <ng-container matColumnDef="bidderId">
            <th mat-header-cell *matHeaderCellDef>Bidder</th>
            <td mat-cell *matCellDef="let bid" class="bidder-cell">{{ bid.bidderId }}</td>
          </ng-container>

          <ng-container matColumnDef="timestamp">
            <th mat-header-cell *matHeaderCellDef>Time</th>
            <td mat-cell *matCellDef="let bid">{{ bid.timestamp | date:'medium' }}</td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator
          [length]="totalElements"
          [pageSize]="pageSize"
          [pageIndex]="pageIndex"
          [pageSizeOptions]="[5, 10, 25]"
          (page)="onPageChange($event)"
          showFirstLastButtons>
        </mat-paginator>
      }
    </mat-card-content>
  </mat-card>
</div>
